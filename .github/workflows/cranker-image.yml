name: cranker-image

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "packages/cranker/**"
      - "packages/sdk/**"
      - "deploy/cranker/Dockerfile"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/cranker-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: cranker-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/fogo-onre-cranker
          tags: |
            type=raw,value=edge,enable={{is_default_branch}}
            type=sha,format=long
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/cranker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Trivy scan (CRITICAL gating)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/fogo-onre-cranker:sha-${{ github.sha }}
          format: table
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true
