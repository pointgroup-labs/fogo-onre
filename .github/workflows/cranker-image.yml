name: cranker-image

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
    paths:
      - 'packages/cranker/**'
      - 'packages/sdk/**'
      - deploy/cranker/Dockerfile
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .github/workflows/cranker-image.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: cranker-image-${{ github.ref }}
  # Cancel superseded runs on branches, but never on tag refs — a tag
  # push always corresponds to a release artifact we want to publish.
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  build:
    runs-on: ubuntu-24.04
    # Hard ceiling so a stuck buildx layer can't consume an entire
    # runner-hour budget.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/fogo-onre-cranker
          tags: |
            type=raw,value=edge,enable={{is_default_branch}}
            type=sha,format=long
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/cranker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Registry cache lives in ghcr alongside the image: persists
          # across branches, isn't capped at 10 GB like type=gha, and
          # isn't evicted when other workflows pressure the cache.
          # `mode=max` exports intermediate layers too — costs a bit
          # more storage, saves a lot of time on partial-hit rebuilds.
          cache-from: |
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/fogo-onre-cranker:buildcache
            type=gha
          cache-to: |
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/fogo-onre-cranker:buildcache,mode=max
            type=gha,mode=max
          provenance: false

      # NOTE: Container CVE scanning was previously wired here via
      # `aquasecurity/trivy-action`, but the action's tag scheme kept
      # drifting out from under our pin (`@0.28.0`, `@0.36.0` both
      # failed to resolve). Removed from the build/push critical path
      # to keep the pipeline reliable. If we want gating back, prefer
      # one of:
      #   1. A separate `cranker-image-scan.yml` on a `schedule:`
      #      trigger that scans the latest `:edge` digest — keeps
      #      transient action-resolution failures off release pushes.
      #   2. Install Trivy via its official install script in a
      #      `run:` step (`curl ... | sh`) — bypasses the action
      #      wrapper entirely.
